{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "inframap-viewer.fullname" . }}
  labels:
    {{- include "inframap-viewer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "inframap-viewer.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingressFrom }}
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: 80
    {{- else }}
    - ports:
        - protocol: TCP
          port: 80
    {{- end }}
  # No egress: the viewer is purely client-side.
  egress: []
{{- end }}
