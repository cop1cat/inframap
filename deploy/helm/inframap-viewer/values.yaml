# Default values for inframap-viewer.

replicaCount: 2

image:
  repository: ghcr.io/cop1cat/inframap-viewer
  tag: ""              # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations: {}
  host: inframap.internal.example.com
  tls:
    enabled: false
    secretName: ""

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]

nodeSelector: {}
tolerations: []
affinity: {}

# Optional: NetworkPolicy that only allows ingress (no egress at all — viewer is client-side).
networkPolicy:
  enabled: false
  ingressFrom: []      # list of {from: [...]} blocks; empty = allow all ingress
