name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli:
    name: CLI (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q

      - name: Verify schema is in sync
        run: |
          uv run python -m inframap.schema_dump
          git diff --exit-code src/inframap/schema/v1.json

  viewer:
    name: Viewer (Bun + Svelte)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
