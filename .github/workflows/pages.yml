name: Deploy viewer to GitHub Pages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        working-directory: viewer
        run: bun install --frozen-lockfile

      - name: Build viewer
        working-directory: viewer
        env:
          # GitHub Pages serves project sites under /<repo>/, so asset URLs
          # in index.html must be prefixed accordingly.
          INFRAMAP_BASE: /${{ github.event.repository.name }}/
        run: bun run build

      - name: Publish JSON Schema alongside the viewer
        run: |
          mkdir -p viewer/dist/schema
          cp src/inframap/schema/v1.json viewer/dist/schema/v1.json

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
