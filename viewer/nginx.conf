server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # cache static assets aggressively
  location ~* \.(js|css|svg|woff2?|png|jpg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # tighten headers; viewer is purely client-side
  add_header X-Content-Type-Options "nosniff";
  add_header X-Frame-Options "SAMEORIGIN";
  add_header Referrer-Policy "no-referrer";
  # The viewer is 100% client-side: no XHR, no embedded iframes, no remote scripts.
  # Service links open in target=_blank so user-controlled URLs never load inside our origin.
  # data: in img-src covers inline SVG icons rendered via background-image.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'none'";

  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
  gzip_min_length 1024;
}
